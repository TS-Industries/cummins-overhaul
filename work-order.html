<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TSI Work Orders">
<title>TSI Work Orders</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:#f5f4f0;color:#1a1a1a;min-height:100vh;}
input,select,textarea,button{font-family:inherit;font-size:14px;border-radius:8px;border:1px solid #ccc;padding:8px 10px;width:100%;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:#555;}
textarea{resize:vertical;min-height:76px;line-height:1.5;}
button{cursor:pointer;width:auto;}

/* Layout */
.app{max-width:740px;margin:0 auto;padding:0 0 60px;}
.app-bar{background:#1a1a1a;padding:14px 16px 12px;position:sticky;top:0;z-index:100;}
.app-bar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.app-logo{height:36px;width:auto;filter:invert(1);}
.app-bar-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.wo-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:4px 10px;text-align:right;display:none;}
.wo-badge-label{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.6);}
.wo-badge-val{font-size:15px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;}
.view-pills{display:flex;gap:6px;margin-top:10px;}
.pill{padding:6px 14px;font-size:12px;border-radius:20px;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);background:transparent;cursor:pointer;white-space:nowrap;}
.pill.active{background:#fff;color:#1a1a1a;border-color:#fff;}
.content{padding:16px;}

/* Cards */
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;margin-bottom:12px;overflow:hidden;}
.card-head{background:#f5f4f0;padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#666;border-bottom:1px solid #e0dfd8;}
.card-body{padding:14px;}
.field-grid{display:grid;gap:10px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:#666;font-weight:500;}

/* Status pills */
.status-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.st-btn{padding:6px 14px;font-size:12px;font-weight:600;border-radius:20px;border:2px solid #ccc;background:#fff;color:#666;cursor:pointer;transition:all .15s;}
.st-draft.active{border-color:#888;background:#e8e6df;color:#2a2a2a;}
.st-open.active{border-color:#1a5fa5;background:#d4e8f8;color:#0a2d53;}
.st-complete.active{border-color:#0f6e56;background:#9fe1cb;color:#04342c;}
.st-invoiced.active{border-color:#3b6d11;background:#c0dd97;color:#173404;}

/* Parts table */
.parts-table{width:100%;border-collapse:collapse;font-size:13px;}
.parts-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#777;font-weight:600;padding:0 6px 8px 0;}
.parts-table td{padding:4px 6px 4px 0;vertical-align:middle;}
.parts-table td input{font-size:13px;padding:6px 8px;}
.del-btn{background:none;border:none;cursor:pointer;color:#aaa;font-size:18px;padding:2px 5px;border-radius:6px;line-height:1;width:auto;}
.del-btn:hover{color:#c0392b;background:#fdf0ee;}
.add-row-btn{font-size:12px;padding:6px 14px;margin-top:10px;background:#f5f4f0;border:1px solid #ccc;color:#555;}
.parts-total{text-align:right;font-size:13px;font-weight:600;color:#1a1a1a;padding-top:8px;border-top:1px solid #e0dfd8;margin-top:6px;}

/* Labour */
.labour-entry{display:grid;grid-template-columns:1fr 1fr 1fr 32px;gap:8px;align-items:end;margin-bottom:8px;}
.labour-entry .field{margin:0;}
.labour-del{align-self:end;padding-bottom:2px;}

/* Signature */
.sig-canvas{border:1px solid #ccc;border-radius:8px;width:100%;touch-action:none;cursor:crosshair;display:block;background:#fafaf8;}
.sig-controls{display:flex;align-items:center;gap:8px;margin-top:8px;}
.sig-note{font-size:11px;color:#888;flex:1;}
.sig-clear{font-size:12px;padding:5px 12px;background:#f5f4f0;border:1px solid #ccc;color:#555;}

/* Action bar */
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.btn-primary{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;}
.btn-primary:hover{background:#333;}
.btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #ccc;border-radius:8px;padding:10px 18px;font-size:14px;}
.btn-secondary:hover{background:#f5f4f0;}
.save-banner{display:none;background:#eaf3de;color:#27500a;border:1px solid #97c459;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;margin-top:10px;}

/* WO List */
.list-head{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:#f5f4f0;border-bottom:1px solid #e0dfd8;}
.list-head-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#888;}
.wo-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0efe8;cursor:pointer;transition:background .1s;}
.wo-row:hover{background:#faf9f6;}
.wo-row:last-child{border-bottom:none;}
.wo-num{font-size:13px;font-weight:600;color:#1a1a1a;min-width:100px;font-variant-numeric:tabular-nums;}
.wo-info{flex:1;min-width:0;}
.wo-customer{font-size:13px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wo-sub{font-size:11px;color:#888;margin-top:1px;}
.wo-badge-list{font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap;}
.b-draft{background:#e8e6df;color:#2a2a2a;}
.b-open{background:#d4e8f8;color:#0a2d53;}
.b-complete{background:#9fe1cb;color:#04342c;}
.b-invoiced{background:#c0dd97;color:#173404;}
.no-wo{padding:2.5rem;text-align:center;color:#aaa;font-size:14px;}

@media(max-width:520px){
  .g2,.g3{grid-template-columns:1fr;}
  .labour-entry{grid-template-columns:1fr 1fr 80px 32px;}
  .parts-table th:nth-child(1),.parts-table td:nth-child(1){display:none;}
}
</style>
</head>

  <div class="content">

    <!-- LIST VIEW -->
    <div id="view-list">
      <div class="card">
        <div class="list-head">
          <span class="list-head-label">Work Orders</span>
          <span class="list-head-label" id="year-label"></span>
        </div>
        <div id="wo-list-items"><div class="no-wo">No work orders yet. Create your first one above.</div></div>
      </div>
    </div>

    <!-- FORM VIEW -->
    <div id="view-form" style="display:none;">

      <div class="card">
        <div class="card-head">Status</div>
        <div class="card-body">
          <div class="status-row">
            <button class="st-btn st-draft active" onclick="setStatus('Draft',this)">Draft</button>
            <button class="st-btn st-open" onclick="setStatus('Open',this)">Open</button>
            <button class="st-btn st-complete" onclick="setStatus('Complete',this)">Complete</button>
            <button class="st-btn st-invoiced" onclick="setStatus('Invoiced',this)">Invoiced</button>
          </div>
          <div class="field-grid g3">
            <div class="field"><label>Date</label><input type="date" id="f-date"></div>
            <div class="field"><label>Priority</label><select id="f-priority"><option>Normal</option><option>Urgent</option><option>Scheduled</option></select></div>
            <div class="field"><label>PO / Reference #</label><input type="text" id="f-po" placeholder="Optional"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">Customer &amp; Site</div>
        <div class="card-body">
          <div class="field-grid g2">
            <div class="field"><label>Customer Name</label><input type="text" id="f-customer" placeholder="Company or individual"></div>
            <div class="field"><label>Contact Person</label><input type="text" id="f-contact"></div>
            <div class="field"><label>Phone</label><input type="tel" id="f-phone"></div>
            <div class="field"><label>Email</label><input type="email" id="f-email"></div>
          </div>
          <div class="field" style="margin-top:10px;"><label>Site / Job Location</label><input type="text" id="f-site" placeholder="Address or site name"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">Equipment</div>
        <div class="card-body">
          <div class="field-grid g3">
            <div class="field"><label>Make</label><input type="text" id="f-make" placeholder="e.g. Caterpillar"></div>
            <div class="field"><label>Model</label><input type="text" id="f-model"></div>
            <div class="field"><label>Serial Number</label><input type="text" id="f-serial"></div>
            <div class="field"><label>Engine Hours</label><input type="number" id="f-hours"></div>
            <div class="field"><label>Unit / Asset Tag</label><input type="text" id="f-unit" placeholder="Optional"></div>
            <div class="field"><label>Location on Site</label><input type="text" id="f-equiploc" placeholder="Optional"></div>
          </div>
        </div>
      </div>

        <div class="card-head">Work Description</div>

<script>
const STORE='tsi_work_orders', CTR='tsi_wo_counters';
let currentStatus='Draft', editingId=null;

function getYear(){return new Date().getFullYear();}
function getNextWO(){
  const y=getYear();
  let c=JSON.parse(localStorage.getItem(CTR)||'{}');
  if(!c[y])c[y]=0;
  c[y]++;
  localStorage.setItem(CTR,JSON.stringify(c));
  return 'WO-'+y+'-'+String(c[y]).padStart(3,'0');
}
function peekWO(){
  const y=getYear();
  let c=JSON.parse(localStorage.getItem(CTR)||'{}');
  return 'WO-'+y+'-'+String((c[y]||0)+1).padStart(3,'0');
}
function loadWOs(){return JSON.parse(localStorage.getItem(STORE)||'[]');}
function saveWOs(list){localStorage.setItem(STORE,JSON.stringify(list));}

function showView(v){
  document.getElementById('view-list').style.display=v==='list'?'':'none';
  document.getElementById('view-form').style.display=v==='form'?'':'none';
  document.getElementById('pill-list').classList.toggle('active',v==='list');
  document.getElementById('pill-new').classList.toggle('active',v==='form');
  document.getElementById('wo-badge').style.display=v==='form'?'block':'none';
  if(v==='list'){renderList();editingId=null;}
}

function newWO(){
  editingId=null;
  resetForm();
  document.getElementById('wo-num-display').textContent=peekWO();
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  showView('form');
}

function resetForm(){
  ['f-date','f-po','f-customer','f-contact','f-phone','f-email','f-site',
   'f-make','f-model','f-serial','f-hours','f-unit','f-equiploc',
   'f-complaint','f-performed','f-recommendations','f-tech','f-completed-date']
   .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-priority').value='Normal';
  document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.st-draft').classList.add('active');
  currentStatus='Draft';
  document.getElementById('parts-body').innerHTML='';
  document.getElementById('parts-total').style.display='none';
  document.getElementById('labour-container').innerHTML='';
  document.getElementById('labour-total').textContent='';
  clearSig();
  addPart(); addLabour();
}

function setStatus(s,btn){
  currentStatus=s;
  document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function addPart(){
  const tbody=document.getElementById('parts-body');
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input type="text" placeholder="Part #"></td>
    <td><input type="text" placeholder="Description"></td>
    <td><input type="number" placeholder="1" min="0" step="any" style="width:64px;" oninput="updatePartsTotal()"></td>
    <td><input type="number" placeholder="0.00" min="0" step="0.01" style="width:80px;" oninput="updatePartsTotal()"></td>
    <td class="row-total" style="font-size:12px;color:#888;white-space:nowrap;">—</td>
    <td><button class="del-btn" onclick="this.closest('tr').remove();updatePartsTotal();">×</button></td>`;
  tbody.appendChild(tr);
}

function updatePartsTotal(){
  let total=0;
  document.querySelectorAll('#parts-body tr').forEach(tr=>{
    const inputs=tr.querySelectorAll('input');
    const qty=parseFloat(inputs[2]?.value)||0;
    const unit=parseFloat(inputs[3]?.value)||0;
    const line=qty*unit;
    const tc=tr.querySelector('.row-total');
    if(tc)tc.textContent=(qty||unit)?'$'+line.toFixed(2):'—';
    total+=line;
  });
  const el=document.getElementById('parts-total');
  if(total>0){el.style.display='';el.textContent='Parts total: $'+total.toFixed(2);}
  else el.style.display='none';
}

function addLabour(){
  const c=document.getElementById('labour-container');
  const div=document.createElement('div');
  div.className='labour-entry';
  div.innerHTML=`<div class="field"><label>Technician</label><input type="text" placeholder="Name"></div>
    <div class="field"><label>Date</label><input type="date"></div>
    <div class="field"><label>Hours</label><input type="number" min="0" step="0.5" placeholder="0.0" oninput="updateLabourTotal()"></div>
    <div class="labour-del"><button class="del-btn" onclick="this.closest('.labour-entry').remove();updateLabourTotal();">×</button></div>`;
  c.appendChild(div);
}

function updateLabourTotal(){
  let total=0;
  document.querySelectorAll('#labour-container .labour-entry').forEach(div=>{
    total+=parseFloat(div.querySelectorAll('input')[2]?.value)||0;
  });
  document.getElementById('labour-total').textContent=total>0?'Total: '+total.toFixed(1)+' hrs':'';
}

// Signature
let drawing=false,lastX=0,lastY=0;
const canvas=document.getElementById('sig-canvas');
const ctx=canvas.getContext('2d');
ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.8;ctx.lineCap='round';ctx.lineJoin='round';

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width,sy=canvas.height/r.height;
  if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};
  return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
}
canvas.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;});
canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;});
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mouseleave',()=>drawing=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;},{passive:false});
canvas.addEventListener('touchend',()=>drawing=false);
function clearSig(){ctx.clearRect(0,0,canvas.width,canvas.height);}

function collectForm(){
  const parts=[];
  document.querySelectorAll('#parts-body tr').forEach(tr=>{
    const i=tr.querySelectorAll('input');
    if(i[0]?.value||i[1]?.value)
      parts.push({partNum:i[0]?.value||'',desc:i[1]?.value||'',qty:i[2]?.value||'',unit:i[3]?.value||''});
  });
  const labour=[];
  document.querySelectorAll('#labour-container .labour-entry').forEach(div=>{
    const i=div.querySelectorAll('input');
    if(i[0]?.value||i[2]?.value)
      labour.push({tech:i[0]?.value||'',date:i[1]?.value||'',hours:i[2]?.value||''});
  });
  return{
    status:currentStatus,
    date:document.getElementById('f-date').value,
    priority:document.getElementById('f-priority').value,
    po:document.getElementById('f-po').value,
    customer:document.getElementById('f-customer').value,
    contact:document.getElementById('f-contact').value,
    phone:document.getElementById('f-phone').value,
    email:document.getElementById('f-email').value,
    site:document.getElementById('f-site').value,
    make:document.getElementById('f-make').value,
    model:document.getElementById('f-model').value,
    serial:document.getElementById('f-serial').value,
    hours:document.getElementById('f-hours').value,
    unit:document.getElementById('f-unit').value,
    equipLoc:document.getElementById('f-equiploc').value,
    complaint:document.getElementById('f-complaint').value,
    performed:document.getElementById('f-performed').value,
    recommendations:document.getElementById('f-recommendations').value,
    tech:document.getElementById('f-tech').value,
    completedDate:document.getElementById('f-completed-date').value,
    signature:canvas.toDataURL(),
    parts,labour
  };
}

function saveWO(){
  const data=collectForm();
  let wos=loadWOs();
  if(editingId){
    const idx=wos.findIndex(w=>w.id===editingId);
    if(idx>-1)wos[idx]={...wos[idx],...data,updatedAt:new Date().toISOString()};
  }else{
    const woNum=getNextWO();
    const nw={id:Date.now().toString(),woNumber:woNum,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),...data};
    wos.unshift(nw);
    document.getElementById('wo-num-display').textContent=woNum;
    editingId=nw.id;
  }
  saveWOs(wos);
  const b=document.getElementById('save-banner');
  b.style.display='block';
  setTimeout(()=>b.style.display='none',3000);
}

function statusClass(s){return{Draft:'b-draft',Open:'b-open',Complete:'b-complete',Invoiced:'b-invoiced'}[s]||'b-draft';}

function renderList(){
  document.getElementById('year-label').textContent=getYear();
  const wos=loadWOs();
  const c=document.getElementById('wo-list-items');
  if(!wos.length){c.innerHTML='<div class="no-wo">No work orders yet. Create your first one above.</div>';return;}
  c.innerHTML=wos.map(w=>`<div class="wo-row" onclick="editWO('${w.id}')">
    <span class="wo-num">${w.woNumber}</span>
    <div class="wo-info">
      <div class="wo-customer">${w.customer||'No customer'}${w.site?' — '+w.site:''}</div>
      <div class="wo-sub">${w.date||''}${w.make?' · '+w.make+' '+(w.model||''):''}</div>
    </div>
    <span class="wo-badge-list ${statusClass(w.status)}">${w.status}</span>
  </div>`).join('');
}

function editWO(id){
  const wos=loadWOs();
  const wo=wos.find(w=>w.id===id);
  if(!wo)return;
  editingId=id;
  resetForm();
  document.getElementById('wo-num-display').textContent=wo.woNumber;
  const sv=(elId,val)=>{const el=document.getElementById(elId);if(el&&val!==undefined&&val!==null)el.value=val;};
  sv('f-date',wo.date);sv('f-po',wo.po);
  document.getElementById('f-priority').value=wo.priority||'Normal';
  sv('f-customer',wo.customer);sv('f-contact',wo.contact);sv('f-phone',wo.phone);sv('f-email',wo.email);sv('f-site',wo.site);
  sv('f-make',wo.make);sv('f-model',wo.model);sv('f-serial',wo.serial);sv('f-hours',wo.hours);sv('f-unit',wo.unit);sv('f-equiploc',wo.equipLoc);
  sv('f-complaint',wo.complaint);sv('f-performed',wo.performed);sv('f-recommendations',wo.recommendations);
  sv('f-tech',wo.tech);sv('f-completed-date',wo.completedDate);
  document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('active'));
  const map={Draft:'st-draft',Open:'st-open',Complete:'st-complete',Invoiced:'st-invoiced'};
  const activeBtn=document.querySelector('.'+( map[wo.status]||'st-draft'));
  if(activeBtn)activeBtn.classList.add('active');
  currentStatus=wo.status||'Draft';
  const tbody=document.getElementById('parts-body');
  tbody.innerHTML='';
  document.getElementById('labour-container').innerHTML='';
  (wo.parts||[]).forEach(p=>{
    addPart();
    const rows=tbody.querySelectorAll('tr');
    const last=rows[rows.length-1];
    const inputs=last.querySelectorAll('input');
    inputs[0].value=p.partNum||'';inputs[1].value=p.desc||'';inputs[2].value=p.qty||'';inputs[3].value=p.unit||'';
  });
  if(!(wo.parts||[]).length)addPart();
  updatePartsTotal();
  (wo.labour||[]).forEach(l=>{
    addLabour();
    const rows=document.querySelectorAll('#labour-container .labour-entry');
    const last=rows[rows.length-1];
    const inputs=last.querySelectorAll('input');
    inputs[0].value=l.tech||'';inputs[1].value=l.date||'';inputs[2].value=l.hours||'';
  });
  if(!(wo.labour||[]).length)addLabour();
  updateLabourTotal();
  if(wo.signature&&wo.signature!=='data:,'){
    const img=new Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=wo.signature;
  }
  showView('form');
}

function printWO(){
  saveWO();
  const wos=loadWOs();
  const wo=editingId?wos.find(w=>w.id===editingId):wos[0];
  if(!wo)return;

    .section{margin-bottom:12px;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
    .sec-head{background:#f5f4f0;padding:5px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;color:#555;border-bottom:1px solid #ddd;}
    .sec-body{padding:8px 10px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
    .field label{font-size:9px;color:#777;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px;}
    .field span{font-size:11px;}
    table{width:100%;border-collapse:collapse;font-size:10px;}
    th{text-align:left;padding:4px 6px;border-bottom:1px solid #ccc;font-size:9px;text-transform:uppercase;color:#777;letter-spacing:.04em;}
    td{padding:4px 6px;border-bottom:1px solid #f0efe8;}

    .sig-img{max-width:280px;max-height:70px;}

    @media print{body{padding:10px;} @page{margin:12mm;}}
  </style>
  </head><body>
  <div class="header">

        <div class="meta-item"><label>Date</label><span>${wo.date||'—'}</span></div>
        <div class="meta-item"><label>Status</label><span class="status-badge" style="${sBadge}">${wo.status}</span></div>
        <div class="meta-item"><label>Priority</label><span>${wo.priority||'Normal'}</span></div>
        ${wo.po?`<div class="meta-item"><label>PO / Ref</label><span>${wo.po}</span></div>`:''}
      </div>
    </div>
  </div>

  <div class="section"><div class="sec-head">Customer &amp; Site</div><div class="sec-body"><div class="grid2">

  w.document.close();

// Init
renderList();
document.getElementById('year-label').textContent=getYear();
</script>
